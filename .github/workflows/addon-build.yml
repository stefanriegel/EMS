name: Build HA Add-on

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'ha-addon/**'
      - 'pyproject.toml'
      - '.github/workflows/addon-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ matrix.arch }} add-on
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [aarch64, amd64]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Sync source into ha-addon/ (the HA builder uses ha-addon/ as context)
      - name: Sync backend source into add-on directory
        run: |
          rm -rf ha-addon/backend
          cp -r backend ha-addon/backend
          cp pyproject.toml ha-addon/pyproject.toml
          find ha-addon/backend -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true

      # Build frontend and copy dist into ha-addon/
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist
        run: |
          rm -rf ha-addon/dist
          cp -r frontend/dist ha-addon/dist

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.arch }}
        uses: home-assistant/builder@2025.03.0
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/ha-addon \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon
