name: Build HA Add-on

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'ems/**'
      - 'pyproject.toml'
      - '.github/workflows/addon-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ matrix.arch }} add-on
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [aarch64, amd64]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy source into add-on build context
        run: |
          cp -r backend ems/backend
          cp -r frontend ems/frontend
          cp pyproject.toml ems/pyproject.toml
          find ems/backend -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.arch }}
        uses: home-assistant/builder@2025.03.0
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/ems \
            --image "ghcr.io/${{ github.repository_owner }}/{arch}-ems" \
            --addon
