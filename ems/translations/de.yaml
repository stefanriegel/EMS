configuration:
  # --- Huawei Modbus ---
  huawei_host:
    name: Huawei Modbus Host
    description: >-
      IP-Adresse des Modbus-TCP-Endpunkts. Bei Verwendung des modbus-proxy
      Add-ons mit host_network auf 127.0.0.1 setzen.
  huawei_port:
    name: Huawei Modbus Port
    description: TCP-Port für die Modbus-Verbindung. Standard ist 502.
  huawei_master_unit_id:
    name: Huawei Master Unit ID
    description: >-
      Modbus-Unit-ID des Master-Wechselrichters (mit Batterie).
      Übliche Werte sind 1 oder 2 — am Wechselrichter prüfen.
  huawei_slave_unit_id:
    name: Huawei Slave Unit ID
    description: >-
      Modbus-Unit-ID des Slave-Wechselrichters (nur PV). Auf 0 setzen,
      wenn nur ein Wechselrichter vorhanden ist.

  # --- Victron ---
  victron_host:
    name: Victron Modbus TCP Host
    description: >-
      IP-Adresse des Venus OS GX-Geraets (Modbus TCP Server).
      Standard-Port ist 502.
  victron_port:
    name: Victron Modbus TCP Port
    description: Modbus TCP Port am Venus OS GX-Geraet. Standard ist 502.
  victron_system_unit_id:
    name: Victron System Modbus-Einheiten-ID
    description: >-
      Modbus-Einheiten-ID fuer System-Register (SoC, Gesamtleistung).
      Standard ist 100 — nur aendern wenn Venus OS nicht-standardmaessige Adressierung verwendet.
  victron_battery_unit_id:
    name: Victron Batterie Modbus-Einheiten-ID
    description: >-
      Modbus-Einheiten-ID fuer Batteriemonitor-Register. Standard ist 225.
      Fuer zukuenftige Nutzung reserviert — die meisten Installationen verwenden den Standard.
  victron_vebus_unit_id:
    name: Victron VE.Bus Modbus-Einheiten-ID
    description: >-
      Modbus-Einheiten-ID fuer den VE.Bus-Wechselrichter (ESS-Sollwert-Schreibzugriffe).
      Standard ist 227 — nur aendern wenn Venus OS nicht-standardmaessige Adressierung verwendet.

  # --- InfluxDB ---
  influxdb_url:
    name: InfluxDB URL
    description: >-
      Vollständige URL der InfluxDB v2 Instanz, z.B. http://192.168.0.10:8086.
      Wird automatisch erkannt wenn das HA InfluxDB Add-on installiert ist —
      leer lassen für Auto-Erkennung.
  influxdb_token:
    name: InfluxDB API Token
    description: >-
      InfluxDB v2 API-Token mit Schreibzugriff auf den Bucket.
      Unter InfluxDB UI → Data → API Tokens zu finden.
      Wird vom HA InfluxDB Add-on automatisch erkannt.
  influxdb_org:
    name: InfluxDB Organisation
    description: InfluxDB Organisationsname. Standard ist "ems".
  influxdb_bucket:
    name: InfluxDB Bucket
    description: InfluxDB Bucket für EMS-Metriken. Standard ist "ems".

  # --- EVCC ---
  evcc_host:
    name: EVCC Host (Überschreibung)
    description: >-
      Leer lassen — EMS findet das EVCC Add-on automatisch.
      Nur setzen wenn EVCC außerhalb von Home Assistant läuft.
  evcc_port:
    name: EVCC API Port (Überschreibung)
    description: >-
      Leer lassen für Auto-Erkennung. Nur für externe EVCC-Installationen.
      Standard-EVCC-API-Port ist 7070.

  # --- HA Entity Monitoring ---
  ha_heat_pump_entity_id:
    name: Wärmepumpe Entity ID
    description: >-
      HA-Sensor-Entity-ID für die aktuelle Leistungsaufnahme der Wärmepumpe
      in Watt. Beispiel: sensor.warmepumpe_total_active_power.
      Leer lassen zum Deaktivieren.

  # --- HA Entity Monitoring (Multi-Entity REST Polling) ---
  ha_entity_heat_pump:
    name: Waermepumpe Leistung Entity
    description: >-
      HA-Sensor-Entity-ID fuer die Waermepumpen-Leistungsaufnahme (W).
      Beispiel: sensor.warmepumpe_total_active_power. Leer lassen zum Deaktivieren.
  ha_entity_cop:
    name: Waermepumpe COP Entity
    description: >-
      HA-Sensor-Entity-ID fuer die Leistungszahl der Waermepumpe.
      Beispiel: sensor.ems_esp_boiler_current_coefficient_of_performance.
      Leer lassen zum Deaktivieren.
  ha_entity_outdoor_temp:
    name: Aussentemperatur Entity
    description: >-
      HA-Sensor-Entity-ID fuer die Aussentemperatur (C).
      Beispiel: sensor.ems_esp_boiler_aussentemperatur. Leer lassen zum Deaktivieren.
  ha_entity_flow_temp:
    name: Vorlauftemperatur Entity
    description: >-
      HA-Sensor-Entity-ID fuer die Heizungs-Vorlauftemperatur (C).
      Beispiel: sensor.ems_esp_boiler_actual_flow_water_temperature.
      Leer lassen zum Deaktivieren.
  ha_entity_return_temp:
    name: Ruecklauftemperatur Entity
    description: >-
      HA-Sensor-Entity-ID fuer die Heizungs-Ruecklauftemperatur (C).
      Beispiel: sensor.ems_esp_boiler_return_temperature.
      Leer lassen zum Deaktivieren.
  ha_entity_hausverbrauch:
    name: Gesamtverbrauch Entity
    description: >-
      HA-Sensor-Entity-ID fuer den Gesamtverbrauch des Haushalts (W).
      Beispiel: sensor.hausverbrauch. Leer lassen zum Deaktivieren.
  ha_entity_steuerbare:
    name: Steuerbare Verbraucher Entity
    description: >-
      HA-Sensor-Entity-ID fuer steuerbare Verbraucher (W).
      Beispiel: sensor.steuerbare_verbraucher. Leer lassen zum Deaktivieren.
  ha_entity_base_load:
    name: Grundlast Entity
    description: >-
      HA-Sensor-Entity-ID fuer die Grundlast (Gesamt minus steuerbare) (W).
      Beispiel: sensor.hausverbrauch_abzgl_steuerbare. Leer lassen zum Deaktivieren.

  # --- ML Verbrauchsprognose ---
  ha_db_path:
    name: HA Datenbank-Pfad
    description: >-
      Pfad zur Home Assistant SQLite-Datenbank für ML-Trainingsdaten.
      Auf HAOS ist dies immer /config/home-assistant_v2.db — nur ändern
      bei benutzerdefiniertem Datenbank-Speicherort.
  ha_statistics_entity_outdoor_temp:
    name: Außentemperatur Entity
    description: >-
      HA-Entity-ID für die Außentemperatur (wird vom ML-Verbrauchsprognosetool
      verwendet). Beispiel: sensor.ems_esp_boiler_aussentemperatur.
  ha_statistics_entity_heat_pump:
    name: Wärmepumpe Statistik-Entity
    description: >-
      HA-Entity-ID für die Wärmepumpen-Verbrauchsstatistik (wird vom
      ML-Prognosetool für das Training verwendet). Beispiel:
      sensor.warmepumpe_total_active_power.
  ha_statistics_entity_dhw:
    name: Warmwasser (DHW) Statistik-Entity
    description: >-
      HA-Entity-ID für den Warmwasser-Verbrauch (optional).
      Wird vom ML-Prognosetool verwendet, wenn die Wärmepumpe einen
      separaten Warmwasserkreis hat. Leer lassen wenn nicht zutreffend.
  ha_ml_min_days:
    name: ML Mindest-Trainingstage
    description: >-
      Mindestanzahl an Tagen mit historischen Daten, bevor das ML-Prognosetool
      Vorhersagen erstellt. Unterhalb dieses Schwellenwerts wird ein einfacher
      saisonaler Durchschnitt verwendet. Standard ist 14 Tage.

  # --- Live Octopus Tarif ---
  ha_octopus_entity_id:
    name: Octopus Strompreis Entity
    description: >-
      HA-Entity-ID mit dem aktuellen Octopus-Strompreis (z.B. von der
      Octopus Energy Integration). Wenn gesetzt, verwendet EMS Live-Preise
      statt des statischen HT/NT-Zeitplans.
      Beispiel: sensor.octopus_a_7721404e_electricity_price.

  # --- Telegram Benachrichtigungen ---
  telegram_bot_token:
    name: Telegram Bot Token
    description: >-
      Token für den Telegram-Bot (von @BotFather). Wird für Benachrichtigungen
      verwendet (Phasenüberlastung, SoC-Grenzen). Leer lassen zum Deaktivieren.
  telegram_chat_id:
    name: Telegram Chat ID
    description: >-
      Numerische Chat-ID für Benachrichtigungen. Über @userinfobot ermitteln.
      Leer lassen zum Deaktivieren.

  # --- EMS Web-UI Authentifizierung ---
  admin_password_hash:
    name: Admin Passwort Hash (bcrypt)
    description: >-
      Optional. Bcrypt-Hash des Admin-Passworts für die EMS-Weboberfläche.
      Erzeugen mit: python3 -c "import bcrypt; print(bcrypt.hashpw(b'passwort',
      bcrypt.gensalt()).decode())". Leer lassen für Login ohne Passwort.
      Der Sitzungsschlüssel wird automatisch generiert.

  # --- Koordinator-Feinabstimmung (erweitert) ---
  huawei_deadband_w:
    name: Huawei Totband (W)
    description: Minimale Leistungsaenderung fuer Huawei-Sollwerte. Standard 400 W.
  victron_deadband_w:
    name: Victron Totband (W)
    description: Minimale Leistungsaenderung fuer Victron-Sollwerte. Standard 150 W.
  ramp_rate_w_per_cycle:
    name: Rampenrate (W/Zyklus)
    description: Maximale Sollwertaenderung pro Steuerzyklus. Standard 500 W.
  min_soc_pct_huawei:
    name: Huawei Min SoC (%)
    description: Mindest-Ladezustand fuer Huawei-Batterie. Standard 10%.
  min_soc_pct_victron:
    name: Victron Min SoC (%)
    description: Mindest-Ladezustand fuer Victron-Batterie. Standard 15%.

  # --- Modul3 Netzentgelt ---
  modul3_surplus_start:
    name: Modul3 Ueberschuss-Start
    description: Beginn des Ueberschuss-Netzentgeltfensters (HH:MM Format, z.B. "00:30").
  modul3_surplus_end:
    name: Modul3 Ueberschuss-Ende
    description: Ende des Ueberschuss-Netzentgeltfensters (HH:MM Format, z.B. "05:00").
  modul3_deficit_start:
    name: Modul3 Defizit-Start
    description: Beginn des Defizit-Netzentgeltfensters (HH:MM Format, z.B. "06:00").
  modul3_deficit_end:
    name: Modul3 Defizit-Ende
    description: Ende des Defizit-Netzentgeltfensters (HH:MM Format, z.B. "22:00").
  modul3_surplus_rate_eur_kwh:
    name: Modul3 Ueberschuss-Tarif
    description: Netzentgelt waehrend des Ueberschussfensters in EUR/kWh.
  modul3_deficit_rate_eur_kwh:
    name: Modul3 Defizit-Tarif
    description: Netzentgelt waehrend des Defizitfensters in EUR/kWh.

  # --- Einspeiseverguetung ---
  feed_in_rate_eur_kwh:
    name: Einspeiseverguetung (EUR/kWh)
    description: Feste Einspeiseverguetung. Standard 0,074 (7,4 ct/kWh, EEG-Verguetung).

  # --- Saisonale Strategie ---
  winter_months:
    name: Wintermonate
    description: Kommagetrennte Monatsnummern fuer Wintersaison (1=Jan, 12=Dez). Standard "11,12,1,2".
  winter_min_soc_boost_pct:
    name: Winter Min-SoC Erhoehung (%)
    description: Zusaetzlicher Min-SoC-Prozentsatz waehrend der Wintermonate fuer hoehere Batteriereserve. Standard 10.

  # --- Logging ---
  log_level:
    name: Log-Level
    description: >-
      Protokollierungs-Detailgrad. INFO für den Normalbetrieb, DEBUG zur
      Fehlersuche.
