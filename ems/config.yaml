name: EMS – Energy Management System
version: "1.11.1"
slug: ems
description: >-
  Energy Management System for Huawei SUN2000 + Victron MultiPlus II.
  Orchestrates battery dispatch, EVCC coordination, InfluxDB logging,
  and Home Assistant telemetry integration.
url: https://github.com/stefanriegel/EMS
image: ghcr.io/stefanriegel/{arch}-ems
arch:
  - amd64
init: false
startup: application
boot: auto
ports:
  "8000/tcp": 8000
ports_description:
  "8000/tcp": EMS web interface and REST API
webui: http://[HOST]:[PORT:8000]
ingress: true
ingress_port: 8000
ingress_entry: /
panel_icon: mdi:battery-charging
panel_title: EMS
watchdog: http://[HOST]:[PORT:8000]/api/health
host_network: true
hassio_api: true
homeassistant_api: true
hassio_role: manager
services:
  - mqtt:want
map:
  - config:rw

options:
  # --- Required: hardware endpoints ---
  huawei_host: ""
  huawei_port: 502
  huawei_master_unit_id: 1
  huawei_slave_unit_id: 2
  emma_enabled: true
  victron_host: ""
  victron_port: 502
  victron_system_unit_id: 100
  victron_battery_unit_id: 225
  victron_vebus_unit_id: 227
  # --- InfluxDB (auto-detected from HA add-on if installed) ---
  influxdb_url: ""
  influxdb_database: "ems"
  influxdb_username: ""
  influxdb_password: ""
  # --- Coordinator tuning (advanced) ---
  huawei_deadband_w: 200
  victron_deadband_w: 150
  ramp_rate_w_per_cycle: 500
  min_soc_pct_huawei: 10
  min_soc_pct_victron: 15
  # --- ML Forecaster: HA DB + entity IDs ---
  ha_db_path: "/config/home-assistant_v2.db"
  ha_statistics_entity_outdoor_temp: ""
  ha_statistics_entity_heat_pump: ""
  ha_statistics_entity_dhw: ""
  ha_ml_min_days: 14
  # --- HA entity monitoring (multi-entity REST polling, all optional) ---
  ha_entity_heat_pump: ""
  ha_entity_cop: ""
  ha_entity_outdoor_temp: ""
  ha_entity_flow_temp: ""
  ha_entity_return_temp: ""
  ha_entity_hausverbrauch: ""
  ha_entity_steuerbare: ""
  ha_entity_base_load: ""
  # --- Modul3 grid-fee tariff (HH:MM format, e.g. "00:30") ---
  modul3_surplus_start: ""
  modul3_surplus_end: ""
  modul3_deficit_start: ""
  modul3_deficit_end: ""
  modul3_surplus_rate_eur_kwh: ""
  modul3_deficit_rate_eur_kwh: ""
  # --- Feed-in tariff ---
  feed_in_rate_eur_kwh: 0.074
  # --- Seasonal strategy ---
  winter_months: "11,12,1,2"
  winter_min_soc_boost_pct: 10
  # --- Logging ---
  log_level: "INFO"

schema:
  # --- Huawei Modbus ---
  huawei_host: str
  huawei_port: int
  huawei_master_unit_id: int
  huawei_slave_unit_id: int
  emma_enabled: bool?
  # --- Victron ---
  victron_host: str
  victron_port: int
  victron_system_unit_id: int?
  victron_battery_unit_id: int?
  victron_vebus_unit_id: int?
  # --- InfluxDB ---
  influxdb_url: str
  influxdb_database: str
  influxdb_username: str
  influxdb_password: password
  # --- Coordinator tuning (advanced) ---
  huawei_deadband_w: int?
  victron_deadband_w: int?
  ramp_rate_w_per_cycle: int?
  min_soc_pct_huawei: int?
  min_soc_pct_victron: int?
  # --- EVCC (auto-discovered, override only) ---
  evcc_host: str?
  evcc_port: int?
  # --- HA entity monitoring ---
  ha_entity_heat_pump: str?
  ha_entity_cop: str?
  ha_entity_outdoor_temp: str?
  ha_entity_flow_temp: str?
  ha_entity_return_temp: str?
  ha_entity_hausverbrauch: str?
  ha_entity_steuerbare: str?
  ha_entity_base_load: str?
  # --- ML Forecaster ---
  ha_db_path: str
  ha_statistics_entity_outdoor_temp: str
  ha_statistics_entity_heat_pump: str
  ha_statistics_entity_dhw: str?
  ha_ml_min_days: int
  # --- Telegram alerts ---
  telegram_bot_token: password?
  telegram_chat_id: str?
  # --- Auth ---
  admin_password_hash: password?
  # --- Modul3 grid-fee tariff (HH:MM format) ---
  modul3_surplus_start: str?
  modul3_surplus_end: str?
  modul3_deficit_start: str?
  modul3_deficit_end: str?
  modul3_surplus_rate_eur_kwh: str?
  modul3_deficit_rate_eur_kwh: str?
  # --- Feed-in tariff ---
  feed_in_rate_eur_kwh: "float?"
  # --- Seasonal strategy ---
  winter_months: "str?"
  winter_min_soc_boost_pct: "int(0,50)?"
  # --- Logging ---
  log_level: list(DEBUG|INFO|WARNING|ERROR)
