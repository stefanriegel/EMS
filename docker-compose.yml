services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${DOCKER_INFLUXDB_INIT_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${DOCKER_INFLUXDB_INIT_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-ems}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-ems}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-ems-dev-token-change-me}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - influxdb-data:/var/lib/influxdb2

  ems:
    build: .
    ports:
      - "8080:8000"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      HUAWEI_HOST: ${HUAWEI_HOST:-192.168.0.10}
      VICTRON_HOST: ${VICTRON_HOST:-192.168.0.20}
      INFLUXDB_URL: ${INFLUXDB_URL:-http://influxdb:8086}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-ems-dev-token-change-me}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-ems}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-ems}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

volumes:
  influxdb-data:
