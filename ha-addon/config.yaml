name: EMS – Energy Management System
version: "0.3.5"
slug: ems
description: >-
  Energy Management System for Huawei SUN2000 + Victron MultiPlus II.
  Orchestrates battery dispatch, EVCC coordination, InfluxDB logging,
  and Home Assistant telemetry integration.
url: https://github.com/stefanriegel/EMS
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
ports:
  "8000/tcp": 8000
ports_description:
  "8000/tcp": EMS web interface and REST API
webui: http://[HOST]:[PORT:8000]
watchdog: http://[HOST]:[PORT:8000]/api/health
host_network: true
hassio_api: true
homeassistant_api: true
hassio_role: manager
services:
  - mqtt:want
map:
  - config:rw

options:
  # --- Required: hardware endpoints ---
  huawei_host: ""
  huawei_port: 502
  huawei_master_unit_id: 1
  huawei_slave_unit_id: 2
  victron_host: ""
  victron_port: 1883
  # --- InfluxDB (auto-detected from HA add-on if installed) ---
  influxdb_url: ""
  influxdb_token: ""
  influxdb_org: "ems"
  influxdb_bucket: "ems"
  # --- ML Forecaster: HA DB + entity IDs ---
  ha_db_path: "/config/home-assistant_v2.db"
  ha_statistics_entity_outdoor_temp: ""
  ha_statistics_entity_heat_pump: ""
  ha_statistics_entity_dhw: ""
  ha_ml_min_days: 14
  # --- Live tariff ---
  ha_octopus_entity_id: ""
  # --- Logging ---
  log_level: "INFO"

schema:
  # --- Huawei Modbus ---
  huawei_host: str
  huawei_port: int
  huawei_master_unit_id: int
  huawei_slave_unit_id: int
  # --- Victron ---
  victron_host: str
  victron_port: int
  # --- InfluxDB ---
  influxdb_url: str
  influxdb_token: password
  influxdb_org: str
  influxdb_bucket: str
  # --- EVCC (auto-discovered, override only) ---
  evcc_host: str?
  evcc_port: int?
  # --- HA entity monitoring ---
  ha_heat_pump_entity_id: str?
  # --- ML Forecaster ---
  ha_db_path: str
  ha_statistics_entity_outdoor_temp: str
  ha_statistics_entity_heat_pump: str
  ha_statistics_entity_dhw: str?
  ha_ml_min_days: int
  ha_octopus_entity_id: str?
  # --- Telegram alerts ---
  telegram_bot_token: password?
  telegram_chat_id: str?
  # --- Auth ---
  admin_password_hash: password?
  # --- Logging ---
  log_level: list(DEBUG|INFO|WARNING|ERROR)
