name: EMS – Energy Management System
version: "0.3.0"
slug: ems
description: >-
  Energy Management System for Huawei SUN2000 + Victron MultiPlus II.
  Orchestrates battery dispatch, EVCC coordination, InfluxDB logging,
  and Home Assistant telemetry integration.
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ports:
  "8000/tcp": 8000
ports_description:
  "8000/tcp": EMS web interface and REST API
watchdog: http://[HOST]:[PORT:8000]/api/health
host_network: true
hassio_api: true
homeassistant_api: true
hassio_role: manager
services:
  - mqtt:want
map:
  - config:rw

options:
  # --- Required: hardware endpoints ---
  huawei_host: ""
  victron_host: ""
  influxdb_url: ""
  influxdb_token: ""
  # --- Port / unit-ID overrides ---
  huawei_port: 502
  huawei_master_unit_id: 1
  huawei_slave_unit_id: 2
  victron_port: 1883
  influxdb_org: "ems"
  influxdb_bucket: "ems"
  # --- Logging ---
  log_level: "INFO"

schema:
  huawei_host: str
  victron_host: str
  influxdb_url: str
  influxdb_token: password
  huawei_port: int
  huawei_master_unit_id: int
  huawei_slave_unit_id: int
  victron_port: int
  influxdb_org: str
  influxdb_bucket: str
  # EVCC: auto-discovered when EVCC add-on is installed; override here for external EVCC
  evcc_host: str?
  evcc_port: int?
  # Heat pump entity: HA sensor entity ID to poll for heat pump load
  ha_heat_pump_entity_id: str?
  # Telegram alerts (optional)
  telegram_bot_token: password?
  telegram_chat_id: str?
  # ML consumption forecaster (optional — requires HA long-term statistics)
  ha_db_path: str?
  ha_statistics_entity_outdoor_temp: str?
  ha_statistics_entity_heat_pump: str?
  ha_statistics_entity_dhw: str?
  ha_ml_min_days: int?
  # Live Octopus tariff from HA entity (optional)
  ha_octopus_entity_id: str?
  # EMS web UI authentication (optional — leave blank to disable login)
  admin_password_hash: password?
  log_level: list(DEBUG|INFO|WARNING|ERROR)
